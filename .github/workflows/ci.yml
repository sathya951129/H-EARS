name: H-EARS Full-Stack CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Test Node.js Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Upgraded from 20 to clear deprecation notices

    - name: Install Backend Dependencies
      run: |
        cd server
        npm install

    - name: Check Backend Syntax Validity
      run: |
        cd server
        node --check index.js

  build-frontend:
    name: Test React Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Runtime Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Upgraded from 20 to clear deprecation notices

    - name: Install Frontend Dependencies
      run: |
        cd client
        npm install

    - name: Compile and Build Production Bundle
      env:
        CI: false
      run: |
        cd client
        npm run build